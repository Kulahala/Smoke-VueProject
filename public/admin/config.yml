              - { label: "Category Products Fallback (产品目录回退)", name: "category.productsFallback", widget: "string" }
              # ── Catalog Page ──
              - { label: "Catalog Eyebrow (小标题)", name: "catalog.eyebrow", widget: "string" }
              - { label: "Catalog Title (大标题)", name: "catalog.title", widget: "string" }
              - { label: "Catalog Intro (介绍)", name: "catalog.intro", widget: "text" }
              - { label: "Catalog All Products (全部产品)", name: "catalog.allProducts", widget: "string" }
              - { label: "Catalog Jump to Category (跳转分类)", name: "catalog.jumpToCategory", widget: "string" }
              - { label: "Catalog Categories (个分类)", name: "catalog.categories", widget: "string" }
              - { label: "Catalog Models (个型号)", name: "catalog.models", widget: "string" }
              - { label: "Catalog View Detail (查看详情)", name: "catalog.viewDetail", widget: "string" }
              - { label: "Catalog Email Pricing (邮件索取报价)", name: "catalog.emailPricing", widget: "string" }
              # ── Product Detail ──
              - { label: "Product Detail (详情)", name: "product.detail", widget: "string" }
              - { label: "Product Highlights (核心卖点)", name: "product.highlights", widget: "string" }
              - { label: "Product Specification (规格参数)", name: "product.specification", widget: "string" }
              - { label: "Product Request Title (报价标题)", name: "product.requestTitle", widget: "string" }
              - { label: "Product Request Text (报价文字)", name: "product.requestText", widget: "text" }
              - { label: "Product Same Category (同分类产品)", name: "product.sameCategory", widget: "string" }
              - { label: "Product Related (相关型号)", name: "product.related", widget: "string" }
              - { label: "Product Not Found (未找到)", name: "product.notFound", widget: "string" }
              - { label: "Product Not Found Text (未找到文字)", name: "product.notFoundText", widget: "string" }
              # ── About Page ──
