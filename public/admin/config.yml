              - { label: "Blog Resource 3 Tag", name: "blog.resource3Tag", widget: "string" }
              - { label: "Blog Product Directory (产品目录)", name: "blog.productDirectory", widget: "string" }
              - { label: "Blog Directory Title (目录标题)", name: "blog.directoryTitle", widget: "string" }
              - { label: "Blog Directory Text (目录文字)", name: "blog.directoryText", widget: "text" }
              - { label: "Blog Loading (加载)", name: "blog.loading", widget: "string" }
              - { label: "Blog Loading Title (加载标题)", name: "blog.loadingTitle", widget: "string" }
              - { label: "Blog Performance 1", name: "blog.performance1", widget: "string" }
              - { label: "Blog Performance 2", name: "blog.performance2", widget: "string" }
              - { label: "Blog Performance 3", name: "blog.performance3", widget: "string" }
              # ── Not Found ──
              - { label: "Not Found Title (404标题)", name: "notFound.title", widget: "string" }
              - { label: "Not Found Text (404文字)", name: "notFound.text", widget: "string" }
              # ── SEO ──
              - { label: "SEO Home Title (首页标题)", name: "seo.homeTitle", widget: "string" }
              - { label: "SEO Home Description (首页描述)", name: "seo.homeDescription", widget: "text" }
              # ── Inquiry Widget ──
              - { label: "Inquiry Button (按钮)", name: "inquiry.button", widget: "string" }
              - { label: "Inquiry Title (标题)", name: "inquiry.title", widget: "string" }
              - { label: "Inquiry Name (姓名)", name: "inquiry.name", widget: "string" }
              - { label: "Inquiry Email (邮箱)", name: "inquiry.email", widget: "string" }
              - { label: "Inquiry Message (留言)", name: "inquiry.message", widget: "string" }
