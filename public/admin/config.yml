backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/电子烟"
public_folder: "/电子烟"

collections:
  # 1. 全局配置：接单邮箱、首页轮播、服务亮点
  - name: "settings"
    label: "Settings (全局设置)"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings (核心信息配置)"
        file: "src/data/settings.json"
        fields:
          - label: "Inquiry Email (询盘接单邮箱)"
            name: "inquiryEmail"
            widget: "string"
          - label: "Web3Forms Access Key (在线询盘邮件转发Key)"
            name: "web3formsKey"
            widget: "string"
            required: false
            hint: "前往 web3forms.com 输入接收邮箱可免费获取该 Key，填入后即可在线接收右下角表单的询盘留言。"
          - label: "Hero Slides (首页轮播大图)"
            name: "heroSlides"
            widget: "list"
            fields:
              - label: "Slide Image (图片)"
                name: "image"
                widget: "image"
              - label: "Title - English (英文标题)"
                name: "title"
                widget: "string"
              - label: "Title - Chinese (中文标题)"
                name: "titleZh"
                widget: "string"
          - label: "Service Points - English (服务亮点-英文版)"
            name: "servicePoints"
            widget: "list"
            field:
              label: "Point"
              name: "point"
              widget: "string"
          - label: "Service Points - Chinese (服务亮点-中文版)"
            name: "servicePointsZh"
            widget: "list"
            field:
              label: "Point"
              name: "point"
              widget: "string"

  # 2. 分类名称修改（大框架只提供文字改名，防止删改结构造成前台挂掉）
  - name: "categories"
    label: "Categories (分类名称编辑)"
    delete: false
    editor:
      preview: false
    files:
      - name: "catalog_categories"
        label: "Category Management (分类系列管理)"
        file: "src/data/categories.json"
        fields:
          - label: "Category Groups (大业务系列)"
            name: "categoryGroups"
            widget: "list"
            fields:
              - label: "Group ID (分类 ID, 禁止更改)"
                name: "id"
                widget: "hidden"
              - label: "Group Name - English (系列名-英文)"
                name: "name"
                widget: "string"
              - label: "Group Name - Chinese (系列名-中文)"
                name: "nameZh"
                widget: "string"
              - label: "Description - English (描述-英文)"
                name: "description"
                widget: "string"
              - label: "Description - Chinese (描述-中文)"
                name: "descriptionZh"
                widget: "string"
              - label: "Hero Cover Image (系列顶部大配图)"
                name: "heroImage"
                widget: "image"
                hint: "⚠️ 必须是纯净、无文字、无规格图表的高清大特写图，防止裁剪后文字杂乱。"
              - label: "Sub Categories (二级子分类)"
                name: "children"
                widget: "list"
                fields:
                  - label: "Category ID (分类 ID, 禁止更改)"
                    name: "id"
                    widget: "hidden"
                  - label: "Category Name - English (分类名-英文)"
                    name: "name"
                    widget: "string"
                  - label: "Category Name - Chinese (分类名-中文)"
                    name: "nameZh"
                    widget: "string"
                  - label: "Short Tag - English (卡片短标签-英文)"
                    name: "shortName"
                    widget: "string"
                  - label: "Short Tag - Chinese (卡片短标签-中文)"
                    name: "shortNameZh"
                    widget: "string"
                  - label: "Description - English (描述-英文)"
                    name: "description"
                    widget: "string"
                  - label: "Description - Chinese (描述-中文)"
                    name: "descriptionZh"
                    widget: "string"
                  - label: "Hero Cover Image (大配图)"
                    name: "heroImage"
                    widget: "image"
                    hint: "⚠️ 必须是纯净、无文字、无规格图表的高清大特写图。"

  # 3. 产品库管理（支持完整的新增、下架、图文内容修改）
  - name: "products"
    label: "Products (商品库)"
    folder: "src/data/products"
    create: true
    slug: "{{id}}"
    extension: "json"
    format: "json"
    editor:
      preview: false
    fields:
      - label: "Product ID (数字ID)"
        name: "id"
        widget: "number"
        value_type: "int"
        hint: "🚨 新增时填入不重复的数字（查看列表中最大 ID，填 最大ID+1）。重复 ID 会覆盖已有产品！"
      - label: "Product Name (产品名称)"
        name: "name"
        widget: "string"
      - label: "Product Image (主图/封面图)"
        name: "image"
        widget: "image"
        hint: "⚠️ 必须上传纯白色背景的渲染图或实拍图，前台会自动渲染为高端照片展示盒效果。"
      - label: "Product Gallery (产品相册多图)"
        name: "images"
        widget: "list"
        required: false
        field:
          label: "Image"
          name: "image"
          widget: "image"
        hint: "💡 第一张图将作为主图/封面图显示在目录卡片上，请确保第一张与上方主图一致。可拖拽排序调整顺序。"
      - label: "Category (所属二级分类)"
        name: "category"
        widget: "select"
        options:
          - label: "换弹设备 (Pod Systems)"
            value: "pod-systems"
          - label: "套装产品 (Starter Kits)"
            value: "starter-kits"
          - label: "一次性电子烟 (Disposable Vapes)"
            value: "disposable-vapes"
          - label: "样品套包 (Sample Packs)"
            value: "sample-packs"
          - label: "替换烟弹 (Replacement Pods)"
            value: "replacement-pods"
          - label: "雾化芯与配件 (Coils & Accessories)"
            value: "coils-accessories"
          - label: "包装与 OEM (Packaging & OEM)"
            value: "packaging-oem"
          - label: "陈列物料 (Retail Displays)"
            value: "retail-displays"
      - label: "Sort Order (排序权重, 数字越小越靠前)"
        name: "sortOrder"
        widget: "number"
        value_type: "int"
        required: false
        hint: "💡 填数字控制产品在目录页的显示顺序，数字越小排越前。留空则按 ID 排序。"
      - label: "Description - English (产品描述-英文)"
        name: "description"
        widget: "text"
      - label: "Description - Chinese (产品描述-中文)"
        name: "descriptionZh"
        widget: "text"
        required: false
      - label: "Key Highlights - English (卖点-英文, 每行一条)"
        name: "highlights"
        widget: "list"
        field:
          name: "item"
          widget: "string"
      - label: "Key Highlights - Chinese (卖点-中文, 每行一条)"
        name: "highlightsZh"
        widget: "list"
        field:
          name: "item"
          widget: "string"
      - label: "Specifications - English (技术参数-英文)"
        name: "specs"
        widget: "list"
        fields:
          - label: "Label (名称, 如 Puffs)"
            name: "label"
            widget: "string"
          - label: "Value (参数值, 如 6000)"
            name: "value"
            widget: "string"
      - label: "Specifications - Chinese (技术参数-中文)"
        name: "specsZh"
        widget: "list"
        fields:
          - label: "Label (名称, 如 口数)"
            name: "label"
            widget: "string"
          - label: "Value (参数值, 如 6000)"
            name: "value"
            widget: "string"
      - label: "MOQ - English (起订量-英文)"
        name: "moq"
        widget: "string"
      - label: "MOQ - Chinese (起订量-中文)"
        name: "moqZh"
        widget: "string"
        required: false
      - label: "Lead Time - English (生产交期-英文)"
        name: "leadTime"
        widget: "string"
      - label: "Lead Time - Chinese (生产交期-中文)"
        name: "leadTimeZh"
        widget: "string"
        required: false
      - label: "Card Badge - English (卡片小角标-英文)"
        name: "badge"
        widget: "string"
      - label: "Card Badge - Chinese (卡片小角标-中文)"
        name: "badgeZh"
        widget: "string"
        required: false

  # 4. 界面文案管理（按钮、标题、流程说明等中英文翻译）
  # ⚠️ 重要：translations.json 的 key 是扁平结构（如 "brand.subtitle"），
  # 不是嵌套对象。以下所有字段必须直接挂在 "en" / "zh" 下，不能用 object 分组，
  # 否则 CMS 保存时会破坏数据结构导致前台显示异常。
  - name: "translations"
    label: "Translations (界面文案)"
    delete: false
    files:
      - name: "all"
        label: "All Translations (全部文案)"
        file: "src/data/translations.json"
        fields:
          - label: "English Translations (英文翻译)"
            name: "en"
            widget: "object"
            fields:
              # ── Brand & Navigation ──
              - { label: "Brand Subtitle (品牌副标题)", name: "brand.subtitle", widget: "string" }
              - { label: "Nav Home (导航-首页)", name: "nav.home", widget: "string" }
              - { label: "Nav Products (导航-产品)", name: "nav.products", widget: "string" }
              - { label: "Nav Company (导航-公司)", name: "nav.company", widget: "string" }
              - { label: "Nav Resources (导航-资料)", name: "nav.resources", widget: "string" }
              - { label: "Nav Email Inquiry (导航-邮箱询盘)", name: "nav.emailInquiry", widget: "string" }
              - { label: "Nav Open (导航-打开菜单)", name: "nav.open", widget: "string" }
              # ── Theme & Language ──
              - { label: "Theme System (跟随系统)", name: "theme.system", widget: "string" }
              - { label: "Theme Light (浅色)", name: "theme.light", widget: "string" }
              - { label: "Theme Dark (深色)", name: "theme.dark", widget: "string" }
              - { label: "Lang EN", name: "lang.en", widget: "string" }
              - { label: "Lang ZH", name: "lang.zh", widget: "string" }
              - { label: "Settings Label (设置标签)", name: "settings.label", widget: "string" }
              - { label: "Settings Theme (主题)", name: "settings.theme", widget: "string" }
              - { label: "Settings Language (语言)", name: "settings.language", widget: "string" }
              # ── Footer ──
              - { label: "Footer Description (页脚描述)", name: "footer.description", widget: "string" }
              - { label: "Footer Product Lines (产品线)", name: "footer.productLines", widget: "string" }
              - { label: "Footer Contact (联系)", name: "footer.contact", widget: "string" }
              - { label: "Footer Contact Note (联系说明)", name: "footer.contactNote", widget: "string" }
              - { label: "Footer Rights (版权)", name: "footer.rights", widget: "string" }
              - { label: "Footer Legal (法律声明)", name: "footer.legal", widget: "string" }
              # ── Home Page ──
              - { label: "Home Eyebrow (小标题)", name: "home.eyebrow", widget: "string" }
              - { label: "Home Title (大标题)", name: "home.title", widget: "string" }
              - { label: "Home Hero Text (轮播说明)", name: "home.heroText", widget: "text" }
              - { label: "Home Email Quote (邮箱询价按钮)", name: "home.emailQuote", widget: "string" }
              - { label: "Home View Products (查看产品按钮)", name: "home.viewProducts", widget: "string" }
              - { label: "Home Metric OEM (指标-OEM)", name: "home.metric.oem", widget: "string" }
              - { label: "Home Metric OEM Text", name: "home.metric.oemText", widget: "string" }
              - { label: "Home Metric MOQ (指标-起订量)", name: "home.metric.moq", widget: "string" }
              - { label: "Home Metric MOQ Text", name: "home.metric.moqText", widget: "string" }
              - { label: "Home Metric Lead (指标-交期)", name: "home.metric.lead", widget: "string" }
              - { label: "Home Metric Lead Text", name: "home.metric.leadText", widget: "string" }
              - { label: "Home Inquiry Desk (询盘台)", name: "home.inquiryDesk", widget: "string" }
              - { label: "Home Product Lines (产品线)", name: "home.productLines", widget: "string" }
              - { label: "Home Intro Title (介绍标题)", name: "home.introTitle", widget: "string" }
              - { label: "Home Intro Text (介绍文字)", name: "home.introText", widget: "text" }
              - { label: "Home Featured (精选)", name: "home.featured", widget: "string" }
              - { label: "Home Showcase (展示)", name: "home.showcase", widget: "string" }
              - { label: "Home Browse Category (浏览分类)", name: "home.browseCategory", widget: "string" }
              - { label: "Home Featured Text (精选说明)", name: "home.featuredText", widget: "text" }
              - { label: "Home How Orders (订单流程标题)", name: "home.howOrders", widget: "string" }
              - { label: "Home Workflow Title (流程标题)", name: "home.workflowTitle", widget: "string" }
              - { label: "Home Step 1 Title", name: "home.step1Title", widget: "string" }
              - { label: "Home Step 1 Text", name: "home.step1Text", widget: "text" }
              - { label: "Home Step 2 Title", name: "home.step2Title", widget: "string" }
              - { label: "Home Step 2 Text", name: "home.step2Text", widget: "text" }
              - { label: "Home Step 3 Title", name: "home.step3Title", widget: "string" }
              - { label: "Home Step 3 Text", name: "home.step3Text", widget: "text" }
              - { label: "Home Wholesale Inquiry (批发询盘)", name: "home.wholesaleInquiry", widget: "string" }
              - { label: "Home Contact Title (联系标题)", name: "home.contactTitle", widget: "string" }
              - { label: "Home Contact Email (联系邮箱)", name: "home.contactEmail", widget: "string" }
              - { label: "Home Show Slide (显示轮播)", name: "home.showSlide", widget: "string" }
              # ── Common ──
              - { label: "Common MOQ (起订量)", name: "common.moq", widget: "string" }
              - { label: "Common Lead Time (交期)", name: "common.leadTime", widget: "string" }
              - { label: "Common Order Mode (订单方式)", name: "common.orderMode", widget: "string" }
              - { label: "Common Email Inquiry (邮箱询盘)", name: "common.emailInquiry", widget: "string" }
              - { label: "Common Contact (联系)", name: "common.contact", widget: "string" }
              - { label: "Common Back Home (返回首页)", name: "common.backHome", widget: "string" }
              - { label: "Common Back Catalogue (返回目录)", name: "common.backCatalogue", widget: "string" }
              - { label: "Common View Products (查看产品)", name: "common.viewProducts", widget: "string" }
              - { label: "Common Wholesale Inquiry (批发询盘)", name: "common.wholesaleInquiry", widget: "string" }
              # ── Category Page ──
              - { label: "Category Directory (目录)", name: "category.directory", widget: "string" }
              - { label: "Category Email Pricing (邮件询价)", name: "category.emailPricing", widget: "string" }
              - { label: "Category Catalogue Items (目录产品)", name: "category.catalogueItems", widget: "string" }
              - { label: "Category Models Available (个型号可询盘)", name: "category.modelsAvailable", widget: "string" }
