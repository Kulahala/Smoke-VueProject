<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Channel sample board placeholder">
  <defs>
    <linearGradient id="board" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbfb"/>
      <stop offset="1" stop-color="#c8d7db"/>
    </linearGradient>
    <linearGradient id="device1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7df2d3"/>
      <stop offset="1" stop-color="#132630"/>
    </linearGradient>
    <linearGradient id="device2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e1bd72"/>
      <stop offset="1" stop-color="#20313b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#071018" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="none"/>
  <g filter="url(#shadow)">
    <rect x="260" y="190" width="680" height="520" rx="46" fill="url(#board)"/>
    <rect x="340" y="300" width="105" height="300" rx="48" fill="url(#device1)"/>
    <rect x="505" y="275" width="110" height="325" rx="52" fill="#14252e"/>
    <rect x="532" y="342" width="56" height="148" rx="24" fill="#7df2d3"/>
    <rect x="675" y="316" width="96" height="284" rx="46" fill="url(#device2)"/>
    <rect x="824" y="356" width="58" height="244" rx="29" fill="#ffffff" opacity=".72"/>
    <rect x="338" y="636" width="544" height="18" rx="9" fill="#10202a" opacity=".18"/>
  </g>
</svg>
