    <rect x="553" y="345" width="86" height="180" rx="30" fill="#7df2d3" opacity=".84"/>
    <rect x="728" y="315" width="118" height="260" rx="48" fill="url(#itemB)" transform="rotate(7 787 445)"/>
    <rect x="330" y="624" width="540" height="16" rx="8" fill="#11212b" opacity=".18"/>
