<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Vape sample pack placeholder">
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fcfc"/>
      <stop offset="1" stop-color="#d5e1e4"/>
    </linearGradient>
    <linearGradient id="itemA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7df2d3"/>
      <stop offset="1" stop-color="#17313c"/>
    </linearGradient>
    <linearGradient id="itemB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e1bd72"/>
      <stop offset="1" stop-color="#20313b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#071018" flood-opacity=".2"/>
