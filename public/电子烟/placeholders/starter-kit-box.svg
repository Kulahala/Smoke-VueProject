<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Starter kit box placeholder">
  <defs>
    <linearGradient id="box" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbfb"/>
      <stop offset=".52" stop-color="#c9d7da"/>
      <stop offset="1" stop-color="#263842"/>
    </linearGradient>
    <linearGradient id="device" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7df2d3"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#071018" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="none"/>
  <g filter="url(#shadow)">
    <rect x="300" y="190" width="600" height="500" rx="42" fill="url(#box)"/>
    <rect x="350" y="245" width="500" height="390" rx="26" fill="#ffffff" opacity=".38"/>
    <rect x="526" y="280" width="148" height="300" rx="56" fill="url(#device)"/>
    <rect x="552" y="246" width="96" height="70" rx="30" fill="#101820"/>
    <rect x="390" y="586" width="420" height="18" rx="9" fill="#101820" opacity=".28"/>
    <rect x="394" y="626" width="220" height="12" rx="6" fill="#7df2d3" opacity=".9"/>
  </g>
</svg>
